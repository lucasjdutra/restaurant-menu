<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="assets/home.jpg" alt="Header Image">
        </div>
        <h1>Menu - Select your dish</h1>
        
        <div class="menu">
            <h2>Main Course</h2>
            <p>All dishes include rice, beans, and the dessert of the day.</p>
        </div>

        <div class="menu">
            <h2>Side Dishes</h2>
            <p>Portions for one person.</p>
        </div>

        <div class="menu info">
            <h2>Personal Information</h2>
            <input type="text">
            <input type="number">
            <input type="text">
        </div>

        <button type="submit"></button>
    </div>

    <script src="script/jquery-4.0.0.min.js"></script>
    <script src="script/jquery.mask.min.js"></script>
    <script src="script/quantity.js"></script>
    <script src="script/script.js"></script>
</body>
</html>
